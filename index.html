<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Планировщик задач</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Планировщик задач</h1>

    <form id="add-form" class="add-form" autocomplete="off">
      <input
        id="new-task"
        type="text"
        placeholder="Новая задача…"
        aria-label="Текст задачи"
        required
        maxlength="200"
      >
      <button type="submit">Добавить</button>
    </form>

    <ul id="task-list" class="task-list" aria-live="polite"></ul>

    <p id="empty-state" class="empty-state" hidden>Задач пока нет.</p>

    <footer class="footer">
      <span id="counter"></span>
      <button id="clear-done" type="button" hidden>Удалить выполненные</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
