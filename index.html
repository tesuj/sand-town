<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>Markdown Editor</h1>
    <time id="clock" class="clock" aria-live="off" aria-label="Current time">--:--:--</time>
    <button id="clear-btn" type="button" class="clear-btn">Clear</button>
  </header>

  <main class="editor">
    <section class="pane pane-input" aria-label="Markdown input">
      <textarea
        id="editor"
        class="markdown-input"
        placeholder="Type markdown here…"
        aria-label="Markdown source"
        spellcheck="false"
      ></textarea>
    </section>

    <section class="pane pane-preview" aria-label="Preview">
      <div id="preview" class="preview" aria-live="polite"></div>
    </section>
  </main>

  <footer class="app-footer">
    &copy; <span id="footer-year">2026</span> Sand Town
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="app.js"></script>
  <script src="clock.js"></script>
  <script src="footer.js"></script>
</body>
</html>
