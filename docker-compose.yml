services:
  db:
    image: postgres:16-alpine
    container_name: pvprospect-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pvprospect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pvprospect}
      POSTGRES_DB: ${POSTGRES_DB:-pvprospect}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pvprospect-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pvprospect}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pvprospect-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pvprospect}:${POSTGRES_PASSWORD:-pvprospect}@db:5432/${POSTGRES_DB:-pvprospect}
      PVWATTS_API_KEY: ${PVWATTS_API_KEY:-}
      NOMINATIM_CONTACT_EMAIL: ${NOMINATIM_CONTACT_EMAIL:-}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  pvprospect-db-data:
